# Centralized knobs for reproducible DVC runs.
# Keep these aligned with CLI flags in src/.

paths:
  raw_news: data/raw/news_VN_cafef.csv
  prices: data/raw/prices_VN.csv
  interim_dir: data/interim
  sentiment_dir: data/sentiment
  model_dir: models/phobert-sentiment/latest

sentiment:
  batch_size: 32
  max_length: 256
  train_epochs: 2
  train_batch_size: 8

model_frame:
  target_type: parkinson
  sentiment_threshold: 0.05

volatility:
  sequence_length: 15
  train_end: "2021-12-31"
  val_end: "2021-12-31"
  epochs: 30
  batch_size: 32
  output_experiment: data/processed/hybrid_experiment_summary.json
  output_robustness: data/processed/robustness_experiment_summary.json
  output_lstm_model: models/volatility/lstm_residual_model.pt
  output_final_dataset: data/processed/final_modeling_dataset.parquet
